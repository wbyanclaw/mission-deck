<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>MISSION DECK</title>
    <link rel="stylesheet" href="./styles.css?v=dashboard-live-20260424202409-g32df9" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <div class="eyebrow">MISSION DECK | 多 Agent 协作面板</div>
          <h1>从用户问句到最终交付，清晰展示多 Agent 协同链路</h1>
          <p id="heroSub" class="sub">由 OpenClaw 驱动，正在读取当前 Agent 编组与协作关系。</p>
        </div>
        <div class="hero-side">
          <div id="versionBadge" class="version-badge">Version: loading...</div>
          <div id="generatedAt" class="generated">更新时间：-</div>
        </div>
      </header>

      <section class="section">
        <div class="section-head">
          <h2>总览</h2>
        </div>
        <div id="summary" class="summary-grid"></div>
      </section>

      <section class="workspace">
        <div class="main-column">
          <section class="section">
            <div class="section-head">
              <h2>组织架构</h2>
              <span class="hint">展示当前分工关系与任务安排</span>
            </div>
            <div id="graph" class="graph-card"></div>
          </section>

          <section class="section">
            <div class="section-head">
              <h2>状态面板</h2>
              <div class="tabs" role="tablist" aria-label="状态切换">
                <button id="tab-tasks" class="tab-button is-active" type="button" role="tab" aria-selected="true">任务状态</button>
                <button id="tab-sessions" class="tab-button" type="button" role="tab" aria-selected="false">会话状态</button>
              </div>
            </div>
            <div id="tasks-panel" class="tab-panel is-active" role="tabpanel">
              <div class="section-head inner-head">
                <span class="hint">任务状态</span>
                <span id="task-count" class="hint">0 项</span>
              </div>
              <div id="timeline" class="timeline"></div>
            </div>
            <div id="sessions-panel" class="tab-panel" role="tabpanel" hidden>
              <div class="section-head inner-head">
                <div class="sessions-tools">
                  <span class="hint">会话状态</span>
                </div>
                <span id="direct-count" class="hint">0 项</span>
              </div>
              <div class="session-filter-bar">
                <button type="button" class="session-filter-chip is-active" data-session-kind="direct">直聊</button>
                <button type="button" class="session-filter-chip is-active" data-session-kind="cron">定时</button>
                <button type="button" class="session-filter-chip is-active" data-session-kind="system">系统</button>
                <button type="button" class="session-filter-chip is-active" data-session-kind="empty">回执</button>
                <button type="button" class="session-filter-chip" data-session-kind="heartbeat">心跳</button>
              </div>
              <div id="directSessions" class="direct-grid"></div>
            </div>
          </section>
        </div>

        <aside class="side-column">
          <section class="section">
            <div class="section-head">
              <h2>Agent 状态</h2>
              <span class="hint">能力、负载、更新</span>
            </div>
            <div id="agents" class="agents-grid sidebar-agents"></div>
          </section>
        </aside>
      </section>
    </main>

    <script type="module">
      await import("./app.js?v=dashboard-live-20260424202409-g32df9");
    </script>
  </body>
</html>
